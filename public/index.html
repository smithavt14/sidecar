<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>sidecar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="/anchor.js"></script>   <!-- the shared matcher; server requires the same file so both agree on occurrences -->
<script src="/serialize.js"></script>   <!-- the tight-diff serialize/reindex round-trip; Node tests require the same file -->
<script src="/lib/marked/marked.min.js"></script>
<script src="/lib/dompurify/dist/purify.min.js"></script>   <!-- marked v12 has no sanitizer; scrub its HTML before it hits innerHTML (XSS) -->
<script src="/lib/diff/dist/diff.min.js"></script>
<script src="/lib/turndown/dist/turndown.js"></script>
<script src="/lib/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
<style>
  /* sidecar design system — clean, modern, single-user. Distinct from the spktr neo-brutalist look:
     hairlines + soft depth shadows, no hard offset borders. One rule holds it together —
     YELLOW = THE AGENT. #ffeb00 appears only on claude's presence, its diffs, its anchors, and
     open-item dots. Never on you, never on a primary button. Ink does the work; chrome is lowercase.
     Source: claude.ai/design "Sidecar Review" spec. */
  @font-face { font-family:'Geist'; font-weight:100 900; font-display:swap;
    src:url('/fonts/geist-latin.woff2') format('woff2'), url('/fonts/geist-latin-ext.woff2') format('woff2'); }
  :root {
    --bg:#ffffff;            /* page surface */
    --fill:#faf9f4;          /* recessed wells: code, diffs, icon holders */
    --ink:#141410;           /* headings, structure, your identity */
    --ink-btn:#1b1a15;       /* primary button */
    --fg:#33332c;            /* body copy */
    --muted:#8a8a82;         /* labels, secondary */
    --faint:#a3a39b;         /* timestamps, quiet quotes */
    --fainter:#b0b0a8;       /* mono meta, em-dash */
    --line:rgba(20,20,15,.08);      /* hairline */
    --line-2:rgba(20,20,15,.14);    /* quote rule, table cell */
    --line-strong:rgba(20,20,15,.16); /* button outline, input */
    --yellow:#ffeb00;        /* THE AGENT — nothing else */
    --yellow-ring:rgba(190,172,0,.65);
    --chip:#fffce0;          /* claude chip tint */
    --chip-fg:#2b2a20;
    --dark:#1b1a15;          /* toast surface */
    --shadow:0 1px 2px rgba(20,20,15,.05), 0 10px 30px -20px rgba(20,20,15,.35);
    --ring:0 0 0 3px rgba(20,20,15,.08);   /* focus — ink-tinted, not yellow (yellow is the agent's) */
    color-scheme:light;
  }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.6 'Geist', ui-sans-serif, system-ui, sans-serif; background:var(--bg);
    color:var(--fg); -webkit-font-smoothing:antialiased; }
  ::selection { background:var(--yellow); color:var(--chip-fg); }
  /* header — white chrome, lowercase wordmark, hairline rule */
  header { position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line); }
  .hwrap { position:relative; display:flex; align-items:center; gap:13px; max-width:1280px; margin:0 auto; padding:14px 40px; }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:-.02em; display:flex; align-items:center; min-width:0; }
  header h1 .home { display:flex; align-items:center; gap:9px; min-width:0; text-decoration:none; color:inherit;
    border-radius:8px; padding:2px 4px; margin:-2px -4px; transition:background .15s ease; }
  header h1 .home:hover { background:var(--fill); }
  header h1 .mark { height:22px; width:auto; flex:none; display:block; }
  header h1 .wm { color:var(--ink); font-weight:600; }
  header h1 #fname { color:var(--muted); font-weight:400; letter-spacing:0; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .spacer { flex:1; }
  #status { font-size:12.5px; color:var(--faint); min-width:64px; text-align:right; }
  /* buttons — ink primary, thin-outline secondary, text ghost. Depth, not weight. */
  button { font:600 13px 'Geist', ui-sans-serif, sans-serif; padding:8px 16px; border:1px solid var(--line-strong);
    border-radius:9px; background:var(--bg); color:var(--fg); cursor:pointer;
    transition:background .15s ease, border-color .15s ease, box-shadow .15s ease; }
  button:hover { background:var(--fill); }
  button.primary { background:var(--ink-btn); color:#fff; border-color:var(--ink-btn); padding:8px 18px; }
  button.primary:hover { background:#000; }
  button.ghost { border:none; background:none; color:var(--muted); font-weight:500; padding:8px 4px; }
  button.ghost:hover { color:var(--fg); background:none; }
  main { display:grid; grid-template-columns: minmax(0,1fr) 372px; gap:0; max-width:1280px; margin:0 auto; }
  /* The document itself is the editor: edit rich text in place, no mode switch, no chrome. */
  /* pwd — the document's path as a terminal breadcrumb, sitting above the doc title */
  #pwd { padding:34px 44px 0; min-width:0; font-family:'Geist Mono', ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12.5px; letter-spacing:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #pwd .dir { color:var(--faint); }
  #pwd .file { color:#57574f; font-weight:500; }
  #pwd:empty { display:none; }
  #doc { padding:8px 44px 40vh; min-width:0; outline:none; caret-color:var(--ink); color:var(--fg); }
  #doc:focus, #doc *:focus { outline:none; }
  #doc h1 { font-size:31px; font-weight:600; letter-spacing:-.03em; color:var(--ink); margin:.2em 0 .55em; }
  #doc h2 { font-size:20px; font-weight:600; letter-spacing:-.02em; color:var(--ink);
    border-bottom:1px solid var(--line); padding-bottom:7px; margin:1.1em 0 .4em; }
  #doc h3 { font-size:16px; font-weight:600; letter-spacing:-.01em; color:var(--ink); }
  #doc p, #doc li { line-height:1.62; }
  #doc pre { background:var(--fill); padding:12px 16px; border-radius:10px; overflow-x:auto;
    font:13px/1.55 'Geist Mono', ui-monospace, Menlo, monospace; }
  #doc code { background:var(--fill); padding:1px 5px; border-radius:4px; font-size:.9em;
    font-family:'Geist Mono', ui-monospace, Menlo, monospace; }
  #doc pre code { padding:0; background:none; }
  #doc img { max-width:100%; height:auto; }
  #doc table { border-collapse:collapse; } #doc td, #doc th { border:1px solid var(--line-2); padding:6px 11px; font-size:14px; }
  /* a document blockquote is CONTENT, not the agent — keep it monochrome (yellow is reserved) */
  #doc blockquote { border-left:2px solid var(--line-2); margin-left:0; padding-left:14px; color:var(--muted); }
  /* an in-doc hyperlink is distinct from an agent anchor (2px yellow underline) — ink, quiet underline */
  #doc a { color:var(--ink); text-decoration:underline; text-decoration-color:var(--line-strong);
    text-underline-offset:2px; }
  #doc a:hover { text-decoration-color:var(--ink); }
  /* A link is only *clickable* while Cmd/Ctrl is held (a plain click has to place the caret in a
     contenteditable), so show the pointer exactly then — same convention as an editor's ctrl+click. */
  #doc.mod a[href] { cursor:pointer; text-decoration-color:var(--accent, var(--ink)); }
  .block { position:relative; }
  .block > :first-child { margin-top:.4em; } .block > :last-child { margin-bottom:.4em; }
  /* persistent cue: an open item softly underlines its span in the agent's yellow, tappable */
  mark.anchor { background:transparent; border-bottom:2px solid var(--yellow); padding:0 1px; cursor:pointer;
    transition:background .15s ease; border-radius:1px; }
  mark.anchor.flash { background:rgba(255,235,0,.32); box-shadow:0 0 0 3px rgba(255,235,0,.3); }
  aside { border-left:1px solid var(--line); padding:22px 20px; display:flex; flex-direction:column; gap:0;
    height:calc(100vh - 51px); overflow-y:auto; position:sticky; top:51px; background:var(--bg); }
  /* review-rail tabs: active threads ↔ archived threads. Pinned to the top of the rail as it scrolls.
     Its padding is an OPAQUE buffer (no transparent margin/gap) so scrolling cards can't crowd under it. */
  .tabs { position:sticky; top:-22px; z-index:2; display:flex; gap:2px; margin:0 -2px;
    padding:10px 2px 14px; background:var(--bg); }
  .tab { font:600 13px 'Geist', ui-sans-serif, sans-serif; border:none; background:none; color:var(--muted);
    padding:7px 11px; border-radius:8px; display:inline-flex; align-items:center; gap:6px; box-shadow:none; }
  .tab:hover { background:var(--fill); color:var(--fg); }
  .tab.on { color:var(--ink); background:var(--fill); }
  .tab .tc { font-size:11px; font-weight:600; background:#eeeee8; color:#57574f; border-radius:20px;
    padding:0 6px; min-width:17px; text-align:center; }
  .tab.on .tc { background:#e4e4dc; }
  .side-list { display:flex; flex-direction:column; gap:8px; }
  /* review card — no border; a soft depth shadow lifts it off the rail */
  .card { background:var(--bg); border-radius:14px; padding:15px 16px; font-size:13px; box-shadow:var(--shadow);
    transition:box-shadow .2s ease; }
  .card.flash { box-shadow:var(--shadow), 0 0 0 3px rgba(255,235,0,.55); }
  /* orphaned: the anchor text is gone — greyed surface, muted identity */
  .card.orphaned { background:#fafaf8; }
  /* identity — the agent is a yellow chip (its color); the human is an ink dot + name. Classed
     .agent / .human, not by literal name, so any SIDECAR_USER / SIDECAR_AGENT colors correctly. */
  .card .who { font-weight:600; display:inline-flex; align-items:center; }
  .who.agent { gap:5px; font-size:12px; color:var(--chip-fg); background:var(--chip);
    border-radius:6px; padding:2px 8px; }
  .who.agent::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--yellow);
    box-shadow:0 0 0 1px var(--yellow-ring); }
  .who.human { gap:6px; font-size:13px; color:var(--ink); }
  .who.human::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--ink); }
  .card.orphaned .who.agent { color:#57574f; background:#f2f2ee; }
  .card.orphaned .who.agent::before { background:#c2c2ba; box-shadow:none; }
  /* kind label — quiet uppercase text, not a bordered badge */
  .card .badge { font-size:10.5px; font-weight:600; letter-spacing:.03em; text-transform:uppercase;
    color:var(--muted); margin-left:8px; }
  .card .badge.suggestion { color:var(--muted); }
  /* flag = "look here" from you — monochrome chip (yellow is the agent's, never yours) */
  .card .badge.flag { background:#f4f4f1; color:#57574f; border-radius:20px; padding:2px 9px;
    margin-left:8px; letter-spacing:.02em; }
  .card .badge.orphaned { color:var(--muted); }
  /* final-status chips on archived cards — monochrome, quiet */
  .card .badge.accepted, .card .badge.rejected, .card .badge.resolved {
    background:#f4f4f1; color:#57574f; border-radius:20px; padding:2px 9px; letter-spacing:.02em; }
  /* archived card — settled, recessed; a flex header so the decided-time sits at the right */
  .card.archived { background:#fafaf8; }
  .card.archived .quote { cursor:default; }
  .card .chead { display:flex; align-items:center; }
  /* the anchored span the card refers to — a yellow left-rule (the agent's), quiet quoted text */
  .card .quote { color:var(--muted); font-size:12.5px; border-left:2px solid var(--yellow); padding-left:10px;
    margin:9px 0; line-height:1.4; cursor:pointer; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .card.orphaned .quote { border-left-color:var(--line-2); color:var(--faint); text-decoration:line-through; }
  .card .when { font-size:11px; color:var(--fainter); margin-left:auto; }
  /* thread messages — bold name (no chip, no dot; the header carries identity) + body */
  .msg { margin:8px 0; font-size:13px; line-height:1.5; color:var(--fg); }
  .msg .who { background:none; padding:0; color:inherit; font-size:13px; }
  .msg .who::before { display:none; }
  .msg .who.agent, .msg .who.human { margin-right:5px; }
  .msg .t { color:var(--fg); }
  /* word-level diff — mono well; deletions strike out muted, insertions carry the agent's yellow */
  .diffbox { font:12.5px/1.6 'Geist Mono', ui-monospace, Menlo, monospace; background:var(--fill); border-radius:10px;
    padding:10px 12px; margin:9px 0; white-space:pre-wrap; word-break:break-word; color:#57574f; }
  .diffbox del { color:var(--faint); text-decoration:line-through; }
  .diffbox ins { background:var(--yellow); color:var(--chip-fg); text-decoration:none; border-radius:3px; padding:0 2px; }
  .row { display:flex; gap:8px; margin-top:11px; align-items:center; }
  .row.spread { justify-content:space-between; }
  .reply { width:100%; font:inherit; font-size:13px; border:1px solid var(--line-2); border-radius:9px;
    padding:8px 11px; background:var(--bg); color:var(--fg); resize:none; overflow:hidden; line-height:1.45;
    min-height:36px; max-height:40vh; overflow-y:auto; }
  .reply::placeholder { color:var(--faint); }
  .reply:focus { outline:none; border-color:var(--ink-btn); box-shadow:var(--ring); }
  /* floating selection toolbar — a soft light card; hover fills grey (your actions stay monochrome) */
  #seltool { position:absolute; display:none; z-index:30; background:var(--bg); border:1px solid var(--line-2);
    border-radius:10px; box-shadow:var(--shadow); padding:4px; align-items:center; gap:1px;
    flex-wrap:wrap; max-width:calc(100vw - 16px); }
  #seltool button { background:none; border:none; box-shadow:none; color:var(--fg); padding:6px 11px;
    border-radius:7px; font-size:13px; font-weight:600; line-height:1; }
  #seltool button:hover { background:var(--fill); color:var(--ink); }
  /* text-style dropdown — a single control replacing the ¶/h1/h2/h3 row */
  #seltool .fmt { position:relative; display:inline-flex; }
  #seltool .fmt-btn { display:inline-flex; align-items:center; gap:3px; }
  #seltool .fmt-btn .car { font-size:9px; opacity:.55; }
  #seltool .fmt-menu { position:absolute; top:calc(100% + 5px); left:0; z-index:1;
    background:var(--bg); border:1px solid var(--line-2); border-radius:10px; box-shadow:var(--shadow);
    padding:4px; display:flex; flex-direction:column; gap:1px; min-width:132px; }
  #seltool .fmt-menu[hidden] { display:none; }
  #seltool .fmt-menu button { display:block; width:100%; text-align:left; white-space:nowrap; }
  #seltool b { font-weight:800; } #seltool i { font-style:italic; font-family:Georgia,serif; }
  #seltool .tsep { width:1px; height:16px; background:var(--line-2); margin:0 3px; }
  #seltool input { background:var(--bg); border:1px solid var(--line-2); color:var(--fg); border-radius:7px;
    font:inherit; font-size:13px; padding:6px 10px; width:230px; outline:none; }
  #seltool input:focus { border-color:var(--ink-btn); box-shadow:var(--ring); }
  #popover { position:absolute; display:none; z-index:31; background:var(--bg); border:1px solid var(--line-2);
    border-radius:12px; box-shadow:var(--shadow); padding:13px; width:300px; }
  /* drag handle — grab this to move the comment box off the text you're commenting on */
  #popover .po-head { display:flex; align-items:center; justify-content:space-between; gap:8px;
    margin:-13px -13px 11px; padding:8px 13px; border-bottom:1px solid var(--line);
    border-radius:12px 12px 0 0; cursor:grab; user-select:none; touch-action:none; }
  #popover .po-head:active { cursor:grabbing; }
  #popover .po-title { font-size:10.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
  #popover .po-grip { color:var(--faint); font-size:13px; line-height:1; letter-spacing:1.5px; }
  #popover textarea { width:100%; min-height:66px; max-height:40vh; overflow-y:auto; font:inherit; font-size:13px;
    border:1px solid var(--line-2); border-radius:9px; padding:8px 10px; resize:vertical; outline:none;
    background:var(--bg); color:var(--fg); }
  #popover textarea::placeholder { color:var(--faint); }
  #popover textarea:focus { border-color:var(--ink-btn); box-shadow:var(--ring); }
  #popover .row { justify-content:flex-end; }
  /* toast — the one dark surface; light action buttons (your decisions stay monochrome) */
  #banner { display:none; position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--dark);
    color:#faf9f4; padding:13px 18px; border-radius:12px; z-index:40; font-size:13.5px;
    box-shadow:0 1px 2px rgba(0,0,0,.2), 0 18px 40px -18px rgba(0,0,0,.5); }
  #banner button { margin-left:10px; background:#fff; color:var(--ink); border:none; font-size:12.5px; padding:6px 12px; }
  #banner button:hover { background:#f0f0ea; }
  /* quiet docs link — a text link in the header chrome, never a CTA */
  .doclink { color:var(--muted); font-size:13px; font-weight:500; text-decoration:none;
    border-bottom:1.5px solid transparent; }
  .doclink:hover { color:var(--fg); }
  /* right cluster: the open/orphaned COUNT — ambient status, not a control */
  .turn { font-size:12.5px; color:var(--faint); display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .turn:empty { display:none; }
  .turn .orphan { color:var(--fg); border-bottom:1.5px solid var(--yellow); cursor:pointer; }
  /* center of the navbar: the shared "are we in the room together?" readout — here ↔ waiting */
  .presence { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); pointer-events:none;
    display:flex; align-items:center; gap:6px; font-size:12.5px; white-space:nowrap; }
  .presence .dot { width:7px; height:7px; border-radius:50%; flex:none; }
  .presence.here { color:#6b6b64; font-weight:500; }
  .presence.here .dot { background:var(--yellow); box-shadow:0 0 0 1px var(--yellow-ring); }
  .presence.away { color:var(--muted); font-weight:500; }
  .presence.away .dot { background:transparent; border:1.5px solid var(--line-strong); }
  .presence.sent { color:var(--muted); font-weight:500; }            /* review handed off — a settled, filled dot */
  .presence.sent .dot { background:var(--muted); box-shadow:none; }
  @keyframes presPulse { 0%,100%{opacity:.35} 50%{opacity:1} }
  .presence.working .dot { animation:presPulse 1.4s ease-in-out infinite; }
  /* docs is a LINK (leaves the page) — mark it as one so it reads differently from status + actions */
  .doclink::after { content:'\2197'; font-size:.82em; margin-left:2px; opacity:.6; }
  /* "done reviewing" is a review ACTION → it lives at the foot of the review column, not the nav bar. */
  .done-foot { display:block; width:100%; margin-top:8px; padding:14px 0 4px; text-align:center;
    font-size:12.5px; font-weight:500; color:var(--muted); background:none; border:none; box-shadow:none;
    border-top:1px solid var(--line); border-radius:0; }
  .done-foot:hover { color:var(--fg); background:none; }
  /* a suggestion nested inside the comment thread it answers (replyTo) — a quiet recessed panel */
  .subcard { margin:10px 0 5px; padding:12px 13px; border:1px solid var(--line-2);
    border-radius:12px; background:var(--fill); }
  .subcard .who { font-weight:600; }
  #filelist { padding:48px 40px; max-width:760px; margin:0 auto; }
  #filelist .h { font-size:22px; font-weight:600; letter-spacing:-.02em; color:var(--ink); margin:0 0 4px; }
  #filelist .sub { font-size:13.5px; color:var(--muted); margin:0 0 26px; }
  #filelist .sub code { font-family:'Geist Mono', ui-monospace, monospace; font-size:12.5px; color:#57574f; }
  #filelist a { display:flex; align-items:center; gap:12px; padding:14px 12px; border-bottom:1px solid var(--line);
    text-decoration:none; color:var(--ink); border-radius:9px; }
  #filelist a:hover { background:var(--fill); }
  #filelist a .nm { font-size:14.5px; font-weight:500; }
  #filelist a .ext { font-family:'Geist Mono', ui-monospace, monospace; font-size:11px; color:var(--fainter); }
  #filelist a .sp { flex:1; }
  #filelist a .ago { font-size:11.5px; color:var(--faint); font-family:'Geist Mono', ui-monospace, monospace;
    white-space:nowrap; }
  #filelist a .none { font-size:12px; color:#c2c2ba; min-width:20px; text-align:center; }
  /* open-count pill — grey chip carrying a single yellow dot (the agent has notes waiting) */
  .count { display:inline-flex; align-items:center; gap:6px; background:#f6f6f2; color:#57574f;
    border-radius:20px; font-size:12px; padding:3px 10px; font-weight:600; }
  .count::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--yellow);
    box-shadow:0 0 0 1px var(--yellow-ring); }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:40px 0; line-height:1.55; }

  /* --- mobile: single-column doc, review panel becomes a pull-up bottom sheet --- */
  #sheetToggle, #sheetBackdrop { display:none; }
  @media (max-width: 780px) {
    main { grid-template-columns: minmax(0,1fr); }   /* minmax(0,…) so a code block can't force overflow */
    #doc pre { max-width:100%; }
    #pwd { padding:16px 18px 0; font-size:12px; }
    #doc { padding: 8px 18px 42vh; font-size: 16px; line-height:1.62; }
    #doc h1 { font-size:25px; } #doc h2 { font-size:18px; }
    /* clear the notch/status bar: pad the top by the safe-area inset so the bar isn't cramped or hidden */
    .hwrap { padding:14px 18px; padding-top:calc(14px + env(safe-area-inset-top)); gap:10px; }
    header h1 { font-size:15px; max-width:56vw; }
    header h1 .mark { height:20px; }
    #status { min-width:0; }
    /* the absolute-center readout collides with the cramped mobile header, so drop it into the flow
       as a compact dot-only chip beside the title — the dot's color/pulse still carries the state
       (yellow=here, outline=away, filled=sent, pulsing=working); the label is hidden to save width. */
    .presence { position:static; transform:none; gap:0; padding:5px; margin-left:-2px;
      background:var(--fill); border-radius:99px; }
    .presence .lbl { display:none; }
    #filelist { padding:28px 18px; }
    #popover { width:min(300px, calc(100vw - 24px)); }
    /* iOS Safari zooms into any focused input with font-size <16px (and won't zoom back). Pin to 16px. */
    .reply, #popover textarea, #seltool input { font-size:16px; }

    /* the sidebar, reframed as a bottom sheet */
    aside {
      position:fixed; left:0; right:0; bottom:0; top:auto; height:76vh;
      border-left:none; border-top:1px solid var(--line); border-radius:22px 22px 0 0;
      background:var(--bg); box-shadow:0 -12px 40px rgba(20,20,15,.18);
      transform:translateY(102%); transition:transform .26s ease-out; z-index:46;
      padding:22px 16px calc(env(safe-area-inset-bottom) + 20px); gap:0;
    }
    aside::before { content:''; position:absolute; top:9px; left:50%; transform:translateX(-50%);
      width:40px; height:4px; border-radius:99px; background:var(--line-strong); }
    body.sheet-open aside { transform:translateY(0); }

    #sheetBackdrop { display:block; position:fixed; inset:0; background:rgba(20,20,15,.28); z-index:45;
      opacity:0; pointer-events:none; transition:opacity .26s; }
    body.sheet-open #sheetBackdrop { opacity:1; pointer-events:auto; }

    /* the pull-up pill — ink surface, the open-item count in the agent's yellow */
    #sheetToggle { display:inline-flex; align-items:center; gap:8px; position:fixed;
      right:16px; bottom:calc(env(safe-area-inset-bottom) + 16px); z-index:44;
      background:var(--ink-btn); color:#fff; border:none; box-shadow:0 8px 20px -6px rgba(20,20,15,.4);
      border-radius:99px; padding:11px 18px; font-weight:600; font-size:14px; }
    #sheetToggle .n { background:var(--yellow); color:var(--chip-fg); border-radius:99px;
      min-width:20px; text-align:center; padding:0 6px; font-size:12.5px; }
    #sheetToggle .n:empty { display:none; }
    body.sheet-open #sheetToggle { display:none; }
  }
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <h1 class="brand">
      <a href="/" class="home" title="all documents">
        <img class="mark" src="/mark.svg" alt="" aria-hidden="true">
        <span class="wm">sidecar</span>
      </a>
    </h1>
    <div id="presence" class="presence away"></div>
    <div class="spacer"></div>
    <div id="turn" class="turn"></div>
    <a class="doclink" href="https://github.com/smithavt14/sidecar" target="_blank" rel="noopener">docs</a>
    <div id="status">saved</div>
  </div>
</header>
<main id="main">
  <div>
    <div id="pwd"></div>
    <div id="doc"></div>
  </div>
  <aside id="side"></aside>
</main>
<div id="filelist" style="display:none"></div>
<div id="seltool">
  <div class="fmt">
    <button data-op="fmt-toggle" class="fmt-btn" title="Text style">¶<span class="car">▾</span></button>
    <div class="fmt-menu" hidden>
      <button data-op="p">¶&nbsp;&nbsp;text</button>
      <button data-op="h1">heading 1</button>
      <button data-op="h2">heading 2</button>
      <button data-op="h3">heading 3</button>
    </div>
  </div>
  <span class="tsep"></span>
  <button data-op="bold" title="Bold (⌘B)"><b>B</b></button>
  <button data-op="italic" title="Italic (⌘I)"><i>I</i></button>
  <span class="tsep"></span>
  <button data-op="link">link</button>
  <button data-op="comment">comment</button>
</div>
<div id="popover"></div>
<div id="banner"></div>
<div id="sheetBackdrop" onclick="toggleSheet(false)"></div>
<button id="sheetToggle" onclick="toggleSheet()">review <span class="n" id="sheetCount"></span></button>

<script>
const qs = new URLSearchParams(location.search);
let FILE = qs.get('f');
let state = null, blocks = [], pendingSel = null;
let sideTab = 'active';   // which review-rail tab is showing: 'active' | 'archived'
let dirty = false, saveTimer = null, savedRange = null;

// HTML → markdown serializer. Escaping off so prose keeps clean markers (no `\*` noise);
// this is a personal editor, not a hostile-input renderer.
const td = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-',
  codeBlockStyle: 'fenced', emDelimiter: '_', hr: '---' });
td.escape = (s) => s;
// GFM round-trip: without these rules turndown flattens tables to loose lines, drops task-list
// checkboxes, and strips ~~strikethrough~~ — silently corrupting any such block it re-serializes.
// (tables/strike/tasklist operate on <table>/<del>/<li><input>; no overlap with the custom li rule below.)
td.use(turndownPluginGfm.gfm);
// Tight list markers ("- " / "1. ", 2-space continuation) instead of turndown's 4-space padding,
// so a one-word edit doesn't reflow every bullet in the git diff.
td.addRule('tightList', {
  filter: 'li',
  replacement: (content, node) => {
    content = content.replace(/^\n+/, '').replace(/\n+$/, '\n').replace(/\n/gm, '\n  ');
    const parent = node.parentNode;
    let prefix = '- ';
    if (parent.nodeName === 'OL') {
      const start = parent.getAttribute('start');
      const idx = Array.prototype.indexOf.call(parent.children, node);
      prefix = (start ? Number(start) + idx : idx + 1) + '. ';
    }
    return prefix + content + (node.nextSibling && !/\n$/.test(content) ? '\n' : '');
  },
});
// The serialize/reindex/toMd round-trip lives in /serialize.js (shared with the Node test suite so
// the exact save-path code is what's tested). These thin wrappers bind the page's live state — the
// configured turndown `td`, the current `blocks` model, `$('doc')`, `marked`, `state.markdown` — so
// every call site below (toMd(el), serialize(), reindex()) stays identical to when it was inline.
function toMd(node) { return Serialize.toMd(node, td); }
function serialize() { return Serialize.serialize($('doc'), blocks, td); }
function reindex() { blocks = Serialize.reindex($('doc'), blocks, state.markdown, marked, td); }

const $ = (id) => document.getElementById(id);

// Relative "last reviewed" label for the file picker (mtime of the doc or its sidecar, whichever is newer).
function timeAgo(ms) {
  if (!ms) return '';
  const s = Math.max(0, (Date.now() - ms) / 1000);
  if (s < 60) return 'just now';
  const m = s / 60; if (m < 60) return Math.floor(m) + 'm ago';
  const h = m / 60; if (h < 24) return Math.floor(h) + 'h ago';
  const d = h / 24; if (d < 7) return Math.floor(d) + 'd ago';
  const w = d / 7; if (w < 5) return Math.floor(w) + 'w ago';
  const mo = d / 30; if (mo < 12) return Math.floor(mo) + 'mo ago';
  return Math.floor(d / 365) + 'y ago';
}

async function api(method, url, body) {
  const r = await fetch(url, { method, headers: {'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined });
  if (!r.ok) throw new Error((await r.json()).error || r.status);
  return r.json();
}

// ---------- boot ----------
async function boot() {
  if (!FILE) {
    const { files, defaultFile } = await api('GET', '/api/files');
    if (defaultFile) { location.search = '?f=' + encodeURIComponent(defaultFile); return; }
    $('main').style.display = 'none'; $('filelist').style.display = 'block';
    const ext = (p) => { const b = p.split('/').pop(); const i = b.lastIndexOf('.'); return i > 0 ? b.slice(i + 1) : ''; };
    $('filelist').innerHTML = '<div class="h">pick a file</div><div class="sub">documents, most recently reviewed first.</div>' + files.map(f =>
      `<a href="/?f=${encodeURIComponent(f.rel)}"><span class="ext">${esc(ext(f.rel))}</span>` +
      `<span class="nm">${esc(f.rel)}</span><span class="sp"></span>` +
      `<span class="ago">${esc(timeAgo(f.mtime))}</span>` +
      (f.open ? `<span class="count">${f.open}</span>` : `<span class="none">—</span>`) + `</a>`).join('');
    return;
  }
  document.title = 'sidecar · ' + FILE;
  $('doc').contentEditable = 'true';
  await reloadFile();
  const es = new EventSource('/events');
  es.onmessage = async (e) => {
    const { rel } = JSON.parse(e.data);
    if (rel !== FILE) return;
    const fresh = await api('GET', '/api/state?path=' + encodeURIComponent(FILE));
    if (fresh.hash === state.hash) {          // our own save, or only the sidecar/presence moved — keep the caret
      state.review = fresh.review;
      state.presence = fresh.presence;        // presence pings arrive here (doc bytes unchanged)
      renderSide();
      return;
    }
    if (dirty) {                              // genuine external edit while we have unsaved text
      showBanner('File changed on disk while you were editing.', [
        { label: 'Reload (discard my edits)', fn: () => { dirty = false; applyState(fresh); } },
        { label: 'Keep typing', fn: () => {} },
      ]);
      return;
    }
    applyState(fresh);
  };
}

async function reloadFile() {
  applyState(await api('GET', '/api/state?path=' + encodeURIComponent(FILE)));
}
function applyState(s) {
  hideBanner();
  state = s; dirty = false; setStatus('saved');
  if (s.code) { const b = document.querySelector('.brand'); if (b) b.title = 'server code ' + s.code; }   // §6b: staleness visible on hover
  renderPwd(); renderDoc(); renderSide();
}
// pwd line above the doc — the document's path, terminal-style (dir muted, filename inked)
function renderPwd() {
  const p = state.pwd || FILE || '';
  const i = p.lastIndexOf('/');
  $('pwd').innerHTML = i >= 0
    ? `<span class="dir">${esc(p.slice(0, i + 1))}</span><span class="file">${esc(p.slice(i + 1))}</span>`
    : `<span class="file">${esc(p)}</span>`;
}
function setStatus(s) { $('status').textContent = s; }
function hideBanner() { $('banner').style.display = 'none'; $('banner').innerHTML = ''; }
function showBanner(text, actions) { // actions: [{label, fn}]
  const b = $('banner');
  b.innerHTML = '';
  b.append(text);
  for (const a of actions) {
    const btn = document.createElement('button');
    btn.textContent = a.label;
    btn.onclick = () => { hideBanner(); a.fn(); };
    b.appendChild(btn);
  }
  b.style.display = 'block';
}

// marked v12 ships no sanitizer, so its HTML output — including any raw HTML embedded in the source
// markdown (<img onerror>, <svg onload>, <script>, javascript: URLs) — would execute when assigned to
// innerHTML, on a page that's same-origin with the file read/write API. Scrub every marked→innerHTML
// path through DOMPurify first. Defaults already drop scripts, event-handler attrs, and unsafe URL
// schemes while keeping headings/lists/tables/links/code/images/bold/italic, so no extra config needed.
// Display-only: the serialize()/toMd save path is separate, so untouched blocks still emit their raw bytes.
function renderMd(tokens) { return DOMPurify.sanitize(marked.parser(tokens)); }

// ---------- doc: one live rich-text surface (contenteditable), saved as markdown ----------
function renderDoc() {
  const doc = $('doc');
  doc.innerHTML = '';
  const tokens = marked.lexer(state.markdown);
  blocks = []; let off = 0;
  for (const t of tokens) {
    const start = off; off += t.raw.length;
    blocks.push({ token: t, start, end: off });
  }
  blocks.forEach((b, i) => {
    if (b.token.type === 'space') return;
    const el = document.createElement('div');
    el.className = 'block'; el.dataset.i = i;
    el.innerHTML = renderMd([b.token]);   // sanitized before it hits the DOM; .block wrapper added after, structure intact
    // Surface a link's destination on hover — inside a contenteditable the href is otherwise invisible.
    el.querySelectorAll('a[href]').forEach(a => { if (!a.title) a.title = a.getAttribute('href'); });
    doc.appendChild(el);
    b.md0 = toMd(el);   // baseline for tight-diff change detection
  });
}

// Typing anywhere in the doc marks it dirty and schedules a debounced serialize→save.
// We never re-render mid-edit (that would lose the caret); the live DOM is the source until save.
$('doc').addEventListener('input', () => { dirty = true; setStatus('editing…'); scheduleSave(); });
$('doc').addEventListener('blur', () => flushSave(), true);
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveDoc, 700); }
async function flushSave() { if (dirty) { clearTimeout(saveTimer); await saveDoc(); } }

// ---------- markdown input rules (type-to-format, à la Notion/Typora) ----------
// We only ever transform the live DOM (a <p> becomes an <h2>/<li>/<blockquote>, a run becomes
// <strong>/<em>/<code>); serialize()+turndown then emit `## `/`- `/`> `/`**…**` on the next save, so
// the tight-diff round-trip and md0 change-detection are untouched. Block count never changes here
// (we rewrite a block in place), so serialize's block↔element alignment still holds.
function caretBlock() {
  const s = getSelection(); if (!s.rangeCount) return null;
  let n = s.anchorNode; if (!n) return null;
  n = n.nodeType === 1 ? n : n.parentElement;
  return n ? n.closest('.block') : null;
}
function firstText(el) { const w = document.createTreeWalker(el, NodeFilter.SHOW_TEXT); return w.nextNode(); }
function stripLead(el, n) { const t = firstText(el); if (t) t.textContent = t.textContent.slice(n); }
// The caret's character offset within an element, and a setter for it. Used to keep the caret exactly where
// the user is typing across a marker-strip + wrapper-swap: after `## ` the caret should sit at the start of
// the (empty) heading and everything typed next flows in — whether the rule fires on the space or, on iOS,
// a keystroke later. We preserve (old offset − stripped marker length), so both timings land right.
function caretOffsetIn(el) {
  const s = getSelection(); if (!s.rangeCount) return 0;
  const r = s.getRangeAt(0).cloneRange(); r.selectNodeContents(el); r.setEnd(s.anchorNode, s.anchorOffset);
  return r.toString().length;
}
function setCaretOffset(el, off) {
  const w = document.createTreeWalker(el, NodeFilter.SHOW_TEXT); let n, acc = 0; const r = document.createRange();
  while ((n = w.nextNode())) {
    if (acc + n.length >= off) { r.setStart(n, off - acc); r.collapse(true); const s = getSelection(); s.removeAllRanges(); s.addRange(r); return; }
    acc += n.length;
  }
  r.selectNodeContents(el); r.collapse(false);   // no text yet (empty heading) → park caret inside it
  const s = getSelection(); s.removeAllRanges(); s.addRange(r);
}

// Block rule: a completed marker at the START of a plain paragraph. Only fires on <p> (marked never
// renders a heading/list/quote as a bare <p>), so a formatted block can't re-trigger. Marker stripped,
// wrapper swapped, caret placed after the marker.
function tryBlockRule(blockEl) {
  const inner = blockEl.firstElementChild;
  if (!inner) return false;
  const isP = inner.nodeName === 'P';
  const isHeading = /^H[1-6]$/.test(inner.nodeName);
  if (!isP && !isHeading) return false;                 // paragraphs (new markers) or headings (re-level) only
  const text = inner.textContent;
  const off = caretOffsetIn(inner);                     // where the caret is, BEFORE we strip the marker
  let m, target, strip = 0;
  if ((m = text.match(/^(#{1,6}) /))) {                 // # … ###### → h1–h6 — also re-levels an existing heading
    strip = m[0].length; stripLead(inner, strip);
    const h = document.createElement('h' + m[1].length);
    while (inner.firstChild) h.appendChild(inner.firstChild);
    inner.replaceWith(h); target = h;
  } else if (isP && text.match(/^> /)) {                // > → blockquote (paragraphs only; keep the inner <p>)
    strip = 2; stripLead(inner, strip);
    const bq = document.createElement('blockquote');
    inner.replaceWith(bq); bq.appendChild(inner); target = inner;
  } else if (isP && ((m = text.match(/^([-*]) /)) || (m = text.match(/^(\d+)\. /)))) {  // - / * / N. → list item
    const ordered = /\d/.test(m[1]);
    strip = m[0].length; stripLead(inner, strip);
    const li = document.createElement('li');
    while (inner.firstChild) li.appendChild(inner.firstChild);
    const list = document.createElement(ordered ? 'ol' : 'ul');
    if (ordered && Number(m[1]) > 1) list.setAttribute('start', m[1]);   // honor `3. ` → starts at 3
    list.appendChild(li); inner.replaceWith(list); target = li;
  } else return false;
  setCaretOffset(target, Math.max(0, off - strip));     // keep the caret where the user was typing
  return true;
}

// Inline rule: a just-closed delimiter run in the current text node → styled element, caret after it.
// Round-trip is a no-op either way (escaping is off, so literal `**x**` text already serialized to
// `**x**`); this just renders it live. `_` is word-boundary-guarded so snake_case is left alone.
const INLINE_RULES = [
  { re: /\*\*([^*\n]+)\*\*$/, tag: 'strong' },
  { re: /`([^`\n]+)`$/, tag: 'code' },
  { re: /(?<![A-Za-z0-9])_([^_\n]+)_$/, tag: 'em' },
  { re: /(?<!\*)\*([^*\n]+)\*$/, tag: 'em' },
];
function tryInlineRule() {
  const sel = getSelection();
  if (!sel.isCollapsed || !sel.rangeCount) return false;
  const node = sel.anchorNode, offset = sel.anchorOffset;
  if (!node || node.nodeType !== 3 || !$('doc').contains(node)) return false;
  const before = node.textContent.slice(0, offset);
  for (const rule of INLINE_RULES) {
    const m = before.match(rule.re); if (!m || !m[1].trim()) continue;
    const start = offset - m[0].length;                 // lookbehind is zero-width, so m[0] starts at the marker
    const r = document.createRange(); r.setStart(node, start); r.setEnd(node, offset); r.deleteContents();
    const el = document.createElement(rule.tag); el.textContent = m[1]; r.insertNode(el);
    // Caret must land OUTSIDE el, or the browser keeps typing inside the styled run. A collapsed caret
    // right after </el> still re-enters it, so park it in a zero-width-space sibling (stripped by toMd).
    const z = document.createTextNode('​'); el.after(z);
    const after = document.createRange(); after.setStart(z, 1); after.collapse(true);
    sel.removeAllRanges(); sel.addRange(after);
    return true;
  }
  return false;
}

// Marker rules ride the existing 'input' → dirty/save path (a second listener; save logic untouched).
// The block rule fires on ANY insertion, not just a clean `insertText` space: iOS autocorrect delivers
// the triggering space after `##`/`###` via a composing/replacement event that isn't insertText+' ', so
// the old strict gate silently dropped headings on mobile (a lone `#` happened to slip through).
// tryBlockRule self-guards — it only acts on a <p> whose text starts with a marker+space, and a formatted
// block is no longer a <p> — so re-checking on every keystroke is harmless and idempotent.
function runBlockRule() { const b = caretBlock(); if (b && tryBlockRule(b)) { dirty = true; scheduleSave(); return true; } return false; }
$('doc').addEventListener('input', (e) => {
  if (e.inputType && e.inputType.startsWith('delete')) return;   // never on backspace/delete
  if (runBlockRule()) return;
  if (e.data && !e.isComposing && '*_`'.includes(e.data) && tryInlineRule()) { dirty = true; scheduleSave(); }
});
// iOS may only settle the space via composition — give the block rule a second shot when it ends.
$('doc').addEventListener('compositionend', runBlockRule);
// Backspace at the very start of a block whose previous block is a table (or fenced code) would, by
// default, merge this paragraph INTO the last table cell — silently corrupting the table. Block it.
$('doc').addEventListener('keydown', (e) => {
  if (e.key !== 'Backspace' || e.shiftKey || e.metaKey || e.altKey || e.ctrlKey) return;
  const s = getSelection();
  if (!s.isCollapsed || !s.rangeCount) return;
  const b = caretBlock(); if (!b) return;
  const probe = s.getRangeAt(0).cloneRange();          // is the caret at the very start of this block?
  probe.selectNodeContents(b); probe.setEnd(s.anchorNode, s.anchorOffset);
  if (probe.toString().length) return;                 // text before the caret → normal backspace
  const prev = b.previousElementSibling;
  if (!prev) return;
  const structured = prev.querySelector('table, pre') ||
    ['TABLE', 'PRE'].includes((prev.firstElementChild || {}).nodeName);
  if (!structured) return;
  e.preventDefault();                                  // never merge a block into a table/code cell
  if (!b.textContent.trim()) {                         // an empty line after the table → let Backspace remove it
    const r = document.createRange(); r.selectNodeContents(prev); r.collapse(false);
    s.removeAllRanges(); s.addRange(r);
    b.remove(); dirty = true; setStatus('editing…'); scheduleSave();
  }
});
// Fenced code block: ``` (optionally with a lang) on its own line, then Enter.
$('doc').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' || e.shiftKey || e.isComposing) return;
  const b = caretBlock(), inner = b && b.firstElementChild;
  if (!inner || inner.nodeName !== 'P') return;
  const fm = inner.textContent.match(/^```(\w*)$/);
  if (!fm) return;
  e.preventDefault();
  const pre = document.createElement('pre'), code = document.createElement('code');
  if (fm[1]) code.className = 'language-' + fm[1];
  // Seed the <code> with a zero-width space: an EMPTY inline <code> isn't a reliable caret host
  // (typing lands in the <pre> and turndown loses the fence). The ​ is stripped by toMd.
  const tn = document.createTextNode('​'); code.appendChild(tn); pre.appendChild(code);
  inner.replaceWith(pre);
  const r = document.createRange(); r.setStart(tn, 1); r.collapse(true);
  const s = getSelection(); s.removeAllRanges(); s.addRange(r);
  dirty = true; setStatus('editing…'); scheduleSave();
});

async function saveDoc() {
  clearTimeout(saveTimer);
  if (!dirty) return;
  const { md, tight } = serialize();
  state.markdown = md;               // keep anchors/occurrence in sync with what's on screen
  setStatus('saving…');
  try {
    const r = await api('PUT', '/api/save', { path: FILE, content: md, baseHash: state.hash });
    state.hash = r.hash; dirty = false; setStatus('saved');
    if (tight) reindex();            // refresh baselines/offsets so the next edit stays tight
  } catch (e) {
    if (String(e.message).includes('changed on disk')) {
      setStatus('conflict');
      showBanner('This file changed on disk while you were editing.', [
        { label: 'Reload (discard my edits)', fn: () => { dirty = false; reloadFile(); } },
        { label: 'Save mine anyway', fn: async () => {
            const r = await api('PUT', '/api/save', { path: FILE, content: md });
            state.hash = r.hash; dirty = false; setStatus('saved');
          } },
      ]);
    } else { setStatus('save failed'); alert('save failed: ' + e.message); }
  }
}

// ---------- selection -> comment (fab + popover) ----------
// Anchor occurrence: when the selected text appears more than once in the file, figure out WHICH
// occurrence was selected — from the block it lives in AND the selection's real offset within that
// block (M2: a comment on the 2nd "foo" in one line must target the 2nd, not the first). All counting
// runs through Anchor.findAll, the same list the server splices from, so the two sides can't disagree.
function occurrenceFor(quote, blockIdx, selOffset) {
  const hits = Anchor.findAll(state.markdown, quote);
  if (hits.length <= 1 || blockIdx == null || !blocks[blockIdx]) return 0;
  const b = blocks[blockIdx];
  const inBlock = [];
  hits.forEach((h, i) => { if (h.start >= b.start && h.start < b.end) inBlock.push(i); });
  if (!inBlock.length) {                       // block holds no raw hit (e.g. markdown differs) → nearest
    let best = 0, bd = Infinity;
    hits.forEach((h, i) => { const d = Math.abs(h.start - b.start); if (d < bd) { bd = d; best = i; } });
    return best;
  }
  // Which duplicate WITHIN the block: count matches in the rendered block text up to the selection
  // offset. Text order is preserved raw↔rendered, so that k picks the k-th in-block raw hit.
  const el = $('doc').querySelector('.block[data-i="' + blockIdx + '"]');
  const k = (el && selOffset != null) ? Anchor.occurrenceAt(el.textContent, quote, selOffset) : 0;
  return inBlock[Math.min(k, inBlock.length - 1)];
}
let pendingSelBlock = null, pendingSelOffset = null, selRect = null;
function onSelectEnd(e) {
  const t = e.target;
  if (!t || !t.closest || t.closest('#seltool,#popover,aside,header')) return;
  setTimeout(() => {
    const sel = window.getSelection();
    const text = sel ? sel.toString().trim() : '';
    if (text.length < 3 || !sel.rangeCount || !$('doc').contains(sel.anchorNode)) { hideTool(); return; }
    pendingSel = text;
    savedRange = sel.getRangeAt(0).cloneRange();   // execCommand needs this restored after the input steals focus
    const blockEl = sel.anchorNode.parentElement && sel.anchorNode.parentElement.closest
      ? sel.anchorNode.parentElement.closest('.block') : null;
    pendingSelBlock = blockEl ? Number(blockEl.dataset.i) : null;
    // The selection start's char offset within its block (rendered text) — feeds occurrenceFor so a

// Drag an absolutely-positioned element by a handle. Delta-based (origin-agnostic), pointer events for

function makeDraggable(el, handle) {

  handle.addEventListener('pointerdown', (e) => {
    if (e.button != null && e.button !== 0) return;
    dragging = true;
    try { handle.setPointerCapture(e.pointerId); } catch (_) {}
    sx = e.clientX; sy = e.clientY;
    ox = parseFloat(el.style.left) || 0; oy = parseFloat(el.style.top) || 0;
    e.preventDefault();
  });
  handle.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const nx = ox + (e.clientX - sx), ny = oy + (e.clientY - sy);
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
    const r = el.getBoundingClientRect();   // keep it reachable — nudge back inside the viewport
    let ax = 0, ay = 0;
    if (r.left < 6) ax = 6 - r.left; else if (r.right > innerWidth - 6) ax = (innerWidth - 6) - r.right;
    if (r.top < 6) ay = 6 - r.top; else if (r.bottom > innerHeight - 6) ay = (innerHeight - 6) - r.bottom;
    if (ax || ay) { el.style.left = (nx + ax) + 'px'; el.style.top = (ny + ay) + 'px'; }

// Delegated card dispatch: one click listener on #side reads data-action off the clicked control and
// the item id off its .card[data-id] — no id ever interpolated into markup. reply/send find the card's
// own .reply textarea via closest('.card'). (autogrow stays on the textarea's static oninput.)
$('side').addEventListener('click', (e) => {
  const tabEl = e.target.closest('[data-tab]');
  if (tabEl) { if (sideTab !== tabEl.dataset.tab) { sideTab = tabEl.dataset.tab; renderSide(); } return; }
  const el = e.target.closest('[data-action]');
  if (!el || !$('side').contains(el)) return;
  // Nearest data-id, so a nested suggestion's accept/reject targets the suggestion (its .subcard[data-id]),
  // while the comment's own reply/resolve/locate resolve to the enclosing .card[data-id].
  const holder = el.closest('[data-id]'); if (!holder) return;
  const id = holder.dataset.id;
  switch (el.dataset.action) {
    case 'locate': locate(id); break;
    case 'accept': decide(id, 'accept'); break;
    case 'reject': decide(id, 'reject'); break;
    case 'resolve': resolveItem(id); break;
    case 'send': reply(id, holder.querySelector('.reply')); break;
  }
});
// Enter-to-send in a reply textarea (Shift+Enter still newlines) — delegated keydown, same id source.
$('side').addEventListener('keydown', (e) => {
  const ta = e.target.closest('[data-action="reply"]');
  if (!ta || e.key !== 'Enter' || e.shiftKey) return;
  e.preventDefault();
  const card = ta.closest('.card'); if (card) reply(card.dataset.id, ta);
});

// ---------- mobile bottom sheet ----------
function toggleSheet(force) {
  const open = force === undefined ? !document.body.classList.contains('sheet-open') : force;
  document.body.classList.toggle('sheet-open', !!open);
}
// Drag-to-dismiss: the sheet follows the finger down and closes past a threshold, else snaps back.
// Only when the card list is scrolled to the top (scrollTop<=0), so dragging doesn't fight scrolling.
(function sheetDrag() {
  const sheet = $('side');
  let startY = 0, dy = 0, dragging = false, fromTop = false;
  sheet.addEventListener('touchstart', (e) => {
    if (!document.body.classList.contains('sheet-open')) return;
    startY = e.touches[0].clientY; dy = 0;
    fromTop = sheet.scrollTop <= 0;
    dragging = true;
    sheet.style.transition = 'none';
  }, { passive: true });
  sheet.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    dy = e.touches[0].clientY - startY;
    if (dy > 0 && fromTop) {                 // dragging the sheet down (not scrolling the list)
      e.preventDefault();
      sheet.style.transform = 'translateY(' + dy + 'px)';
    }
  }, { passive: false });
  const end = () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';             // restore the .26s ease so close/snap-back animates
    sheet.style.transform = '';              // fall back to CSS: translateY(0) or (on close) 102%
    if (dy > 110) toggleSheet(false);        // past threshold → dismiss
  };
  sheet.addEventListener('touchend', end);
  sheet.addEventListener('touchcancel', end);
})();

// ---------- anchor highlights: a persistent cue on every commented/suggested span ----------
// Wrap the (occurrence-th) match of an anchor quote in <mark data-id> — across text nodes, so a
// phrase that spans bold/links stays fully highlighted. Marks are contenteditable:false (a clean tap
// target, no keyboard) and are stripped by toMd() on save, so they never touch the markdown.
function wrapAnchor(quote, occurrence, id) {
  const walker = document.createTreeWalker($('doc'), NodeFilter.SHOW_TEXT);
  const nodes = []; let full = '';
  while (walker.nextNode()) { nodes.push({ node: walker.currentNode, start: full.length }); full += walker.currentNode.textContent; }
  // Same matcher the server + occurrenceFor use, run over the concatenated rendered text; the returned
  // offsets index straight into `full`, so the text-node slicing below is unchanged.
  const hit = Anchor.findNth(full, quote, occurrence || 0);
  if (!hit) return null;
  const { start, end } = hit;
  const slices = [];
  for (const { node, start: ns } of nodes) {
    const ne = ns + node.textContent.length;
    if (ne <= start || ns >= end) continue;
    slices.push({ node, s: Math.max(0, start - ns), e: Math.min(node.textContent.length, end - ns) });
  }
  let first = null;
  for (const sl of slices) {
    const r = document.createRange(); r.setStart(sl.node, sl.s); r.setEnd(sl.node, sl.e);
    const mark = document.createElement('mark'); mark.className = 'anchor'; mark.dataset.id = id; mark.contentEditable = 'false';
    try { r.surroundContents(mark); if (!first) first = mark; } catch {}
  }
  return first;
}
// Re-apply the cues to match current open items. Skipped while the doc is being edited (protects the
// caret); the marks refresh on the next render/save cycle.
function markAnchors() {
  const doc = $('doc');
  if (document.activeElement === doc || doc.contains(document.activeElement)) return;
  doc.querySelectorAll('mark.anchor').forEach(m => { const p = m.parentNode; while (m.firstChild) p.insertBefore(m.firstChild, m); p.removeChild(m); });
  doc.normalize();
  for (const it of state.review.items) {
    if (!['open', 'pending'].includes(it.status)) continue;
    if (it.kind === 'suggestion' && it.replyTo) continue;   // shares its parent comment's span — don't double-wrap
    // Guarded per item: a throw here used to abandon every REMAINING highlight, so the document
    // silently lost its cues while the cards still listed them.
    try { wrapAnchor(it.anchor.quote, it.anchor.occurrence || 0, it.id); }
    catch (e) { console.error('sidecar: failed to highlight', it.id, e); }
  }
}
function pulse(nodes) { nodes.forEach(m => m.classList.add('flash')); setTimeout(() => nodes.forEach(m => m.classList.remove('flash')), 1400); }
// Tap a highlight in the doc → open its review (sheet on mobile) and flash the matching card.
$('doc').addEventListener('click', (e) => {
  const m = e.target.closest && e.target.closest('mark.anchor');
  if (m && m.dataset.id) openReview(m.dataset.id);
});
// Cmd/Ctrl+click opens a link. A PLAIN click must keep placing the caret: this is a contenteditable,
// so hijacking every click would make the text around a link uneditable.
$('doc').addEventListener('click', (e) => {
  if (!(e.metaKey || e.ctrlKey)) return;
  const a = e.target.closest && e.target.closest('a[href]');
  if (!a) return;
  const href = a.getAttribute('href') || '';
  if (!/^https?:\/\//i.test(href)) return;   // outbound http(s) only — never javascript:/file paths
  e.preventDefault();
  window.open(href, '_blank', 'noopener,noreferrer');
});
// While Cmd/Ctrl is held, mark the doc so links show a pointer (see #doc.mod a[href]). Cleared on
// keyup AND on window blur — otherwise Cmd+Tab away leaves the modifier stuck "held" on return.
const setModHeld = (on) => $('doc').classList.toggle('mod', on);
window.addEventListener('keydown', (e) => { if (e.key === 'Meta' || e.key === 'Control') setModHeld(true); });
window.addEventListener('keyup', (e) => { if (e.key === 'Meta' || e.key === 'Control') setModHeld(false); });
window.addEventListener('blur', () => setModHeld(false));
function openReview(id) {
  toggleSheet(true);
  document.querySelectorAll('.flash').forEach(m => m.classList.remove('flash'));
  pulse([...$('doc').querySelectorAll('mark.anchor[data-id="' + id + '"]')]);
  const card = $('side').querySelector('.card[data-id="' + id + '"]');
  if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); pulse([card]); }
}
// Click a card's quote → jump to (and flash) its highlight in the doc.
function locate(id) {
  toggleSheet(false);
  markAnchors();
  document.querySelectorAll('.flash').forEach(m => m.classList.remove('flash'));
  const marks = [...$('doc').querySelectorAll('mark.anchor[data-id="' + id + '"]')];
  if (!marks.length) return;
  marks[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  pulse(marks);
}

boot();
</script>
</body>
</html>
