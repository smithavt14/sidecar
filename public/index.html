<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>margin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="/anchor.js"></script>   <!-- the shared matcher; server requires the same file so both agree on occurrences -->
<script src="/serialize.js"></script>   <!-- the tight-diff serialize/reindex round-trip; Node tests require the same file -->
<script src="/lib/marked/marked.min.js"></script>
<script src="/lib/dompurify/dist/purify.min.js"></script>   <!-- marked v12 has no sanitizer; scrub its HTML before it hits innerHTML (XSS) -->
<script src="/lib/diff/dist/diff.min.js"></script>
<script src="/lib/turndown/dist/turndown.js"></script>
<script src="/lib/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
<style>
  /* spktr design language: monochrome cream/ink canvas, one electric-yellow accent, Geist,
     lowercase chrome, neo-brutalist hard-shadow lift. Source: spktr/design.md + globals.css. */
  @font-face { font-family:'Geist'; font-weight:100 900; font-display:swap;
    src:url('/fonts/geist-latin.woff2') format('woff2'), url('/fonts/geist-latin-ext.woff2') format('woff2'); }
  :root { --bg:#fbfbf7; --fg:#0f0f0c; --muted:#6f6f68; --line:rgba(15,15,12,.14);
    --line-strong:rgba(15,15,12,.28); --card:#ffffff; --accent:#ffeb00; --accent-fg:#0a0a0a;
    --dark:#0a0900; --ring:0 0 0 3px rgba(255,235,0,.55); color-scheme:light; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.6 'Geist', ui-sans-serif, system-ui, sans-serif; background:var(--bg);
    color:var(--fg); -webkit-font-smoothing:antialiased; }
  ::selection { background:var(--accent); color:var(--accent-fg); }
  /* header — cream chrome, lowercase wordmark, hairline rule (the site's calm, not the yellow hero) */
  header { position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line); }
  .hwrap { display:flex; align-items:center; gap:14px; max-width:1280px; margin:0 auto; padding:12px 40px; }
  header h1 { font-size:16px; margin:0; font-weight:500; letter-spacing:-.02em; display:flex; align-items:center; gap:8px; min-width:0; }
  /* spktr/margin lockup — ghost mark + wordmark read as a terminal path (spktr is the parent, /margin the tool) */
  header h1 .ghost { width:24px; height:24px; flex:none; }
  header h1 .wm { color:var(--fg); font-weight:500; }
  header h1 .wm .sep { color:var(--fg); font-weight:600; margin:0 1px; }
  header h1 #fname { color:var(--muted); font-weight:400; letter-spacing:0; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .spacer { flex:1; }
  #status { font-size:12px; color:var(--muted); min-width:70px; text-align:right; }
  /* buttons — the spktr signature: 2px border, hard offset shadow, lift on hover */
  button { font:inherit; font-size:13px; font-weight:600; padding:5px 13px; border:1.5px solid var(--fg);
    border-radius:6px; background:var(--card); color:var(--fg); cursor:pointer; box-shadow:3px 3px 0 0 var(--fg);
    transition:transform .15s ease-out, box-shadow .15s ease-out, background .15s ease-out; }
  button:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 0 var(--fg); }
  button:active { transform:translate(1px,1px); box-shadow:1px 1px 0 0 var(--fg); }
  button.primary { background:var(--accent); color:var(--accent-fg); }
  button.ghost { border:none; background:none; box-shadow:none; color:var(--muted); font-weight:500; }
  button.ghost:hover { transform:none; box-shadow:none; color:var(--fg); background:none; }
  main { display:grid; grid-template-columns: minmax(0,1fr) 372px; gap:0; max-width:1280px; margin:0 auto; }
  /* The document itself is the editor: edit rich text in place, no mode switch, no chrome. */
  /* pwd — the document's path as a terminal breadcrumb, sitting above the doc title */
  #pwd { padding:30px 40px 0; min-width:0; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12.5px; letter-spacing:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #pwd .dir { color:var(--muted); }
  #pwd .file { color:var(--fg); font-weight:500; }
  #pwd:empty { display:none; }
  #doc { padding:10px 40px 40vh; min-width:0; outline:none; caret-color:var(--fg); }
  #doc:focus, #doc *:focus { outline:none; }
  #doc h1 { font-size:1.7em; font-weight:500; letter-spacing:-.025em; }
  #doc h2 { font-size:1.3em; font-weight:500; letter-spacing:-.02em; border-bottom:1px solid var(--line); padding-bottom:5px; }
  #doc h3 { font-weight:600; letter-spacing:-.01em; }
  #doc pre { background:rgba(15,15,12,.05); padding:12px 16px; border-radius:10px; overflow-x:auto;
    font:13px/1.5 ui-monospace, Menlo, monospace; }
  #doc code { background:rgba(15,15,12,.06); padding:1px 5px; border-radius:4px; font-size:.9em;
    font-family:ui-monospace, Menlo, monospace; }
  #doc pre code { padding:0; background:none; }
  #doc table { border-collapse:collapse; } #doc td, #doc th { border:1px solid var(--line); padding:6px 11px; font-size:14px; }
  #doc blockquote { border-left:2px solid var(--accent); margin-left:0; padding-left:14px; color:var(--muted); }
  #doc a { color:var(--fg); text-decoration:none; border-bottom:2px solid var(--accent); }
  .block { position:relative; }
  .block > :first-child { margin-top:.4em; } .block > :last-child { margin-bottom:.4em; }
  /* persistent cue: commented/suggested text stays softly highlighted + underlined, tappable */
  mark.anchor { background:rgba(255,235,0,.32); border-radius:2px; padding:0 .5px; cursor:pointer;
    box-shadow:inset 0 -1.5px 0 rgba(198,180,0,.9); transition:background .15s, box-shadow .15s; }
  mark.anchor.flash { background:var(--accent); box-shadow:var(--ring); }   /* brief pulse when located */
  aside { border-left:1px solid var(--line); padding:20px 18px; display:flex; flex-direction:column; gap:12px;
    height:calc(100vh - 50px); overflow-y:auto; position:sticky; top:50px; background:var(--bg); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; font-size:13px;
    transition:box-shadow .2s ease, border-color .2s ease; }
  .card.flash { border-color:var(--fg); box-shadow:0 0 0 3px rgba(255,235,0,.7); }
  /* provenance stays monochrome: ink dot = alex, yellow dot = claude (the AI carries the accent) */
  .card .who { font-weight:600; }
  .card .who::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%;
    margin-right:6px; vertical-align:baseline; }
  .who.alex::before { background:var(--fg); }
  .who.claude::before { background:var(--accent); box-shadow:0 0 0 1px var(--fg); }
  .card .quote { color:var(--muted); font-size:12px; border-left:2px solid var(--accent); padding-left:9px;
    margin:8px 0; cursor:pointer; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .card .badge { font-size:10.5px; letter-spacing:.02em; padding:2px 8px; border-radius:6px;
    border:1px solid var(--line-strong); color:var(--muted); }
  .card .badge.suggestion { color:var(--fg); border-color:var(--fg); }
  .card .badge.flag { background:var(--accent); color:var(--accent-fg); border-color:var(--fg); }
  .card .badge.orphaned { color:var(--muted); border-color:var(--muted); }
  .msg { margin:7px 0; } .msg .t { color:var(--fg); }
  /* diffs stay monochrome+yellow: additions get the electric highlight, deletions a muted strike */
  .diffbox { font:12.5px/1.55 ui-monospace, Menlo, monospace; background:rgba(15,15,12,.04); border-radius:9px;
    padding:9px 11px; margin:8px 0; white-space:pre-wrap; word-break:break-word; border:1px solid var(--line); }
  .diffbox del { color:var(--muted); text-decoration:line-through; }
  .diffbox ins { background:var(--accent); color:var(--accent-fg); text-decoration:none; border-radius:2px; }
  .row { display:flex; gap:8px; margin-top:10px; align-items:center; }
  .row.spread { justify-content:space-between; }
  .reply { width:100%; font:inherit; font-size:13px; border:1px solid var(--line-strong); border-radius:8px;
    padding:6px 10px; background:var(--card); resize:none; overflow:hidden; line-height:1.45;
    min-height:34px; max-height:40vh; overflow-y:auto; }
  .reply:focus { outline:none; border-color:rgba(15,15,12,.6); box-shadow:var(--ring); }
  /* floating selection toolbar — a neo-brutalist light card, hover fills yellow */
  #seltool { position:absolute; display:none; z-index:30; background:var(--card); border:1.5px solid var(--fg);
    border-radius:8px; box-shadow:3px 3px 0 0 var(--fg); padding:3px; align-items:center; gap:1px;
    flex-wrap:wrap; max-width:calc(100vw - 16px); }
  #seltool button { background:none; border:none; box-shadow:none; color:var(--fg); padding:5px 10px;
    border-radius:5px; font-size:13px; font-weight:600; line-height:1; }
  #seltool button:hover { background:var(--accent); color:var(--accent-fg); transform:none; box-shadow:none; }
  #seltool b { font-weight:800; } #seltool i { font-style:italic; font-family:Georgia,serif; }
  #seltool .tsep { width:1px; height:16px; background:var(--line-strong); margin:0 3px; }
  #seltool input { background:var(--card); border:1px solid var(--line-strong); color:var(--fg); border-radius:6px;
    font:inherit; font-size:13px; padding:5px 9px; width:230px; outline:none; }
  #seltool input:focus { border-color:rgba(15,15,12,.6); box-shadow:var(--ring); }
  #popover { position:absolute; display:none; z-index:31; background:var(--card); border:1.5px solid var(--fg);
    border-radius:12px; box-shadow:4px 4px 0 0 var(--fg); padding:12px; width:300px; }
  #popover textarea { width:100%; min-height:66px; max-height:40vh; overflow-y:auto; font:inherit; font-size:13px;
    border:1px solid var(--line-strong); border-radius:8px; padding:7px 9px; resize:vertical; outline:none; background:var(--bg); }
  #popover textarea:focus { border-color:rgba(15,15,12,.6); box-shadow:var(--ring); }
  #popover .row { justify-content:flex-end; }
  /* toast — the one near-black surface (spktr's email/print tone), yellow action */
  #banner { display:none; position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--dark);
    color:#fbfbf7; padding:12px 18px; border-radius:12px; z-index:40; font-size:13.5px; box-shadow:5px 5px 0 0 rgba(10,9,0,.35); }
  #banner button { margin-left:10px; background:var(--accent); color:var(--accent-fg); border-color:var(--dark);
    box-shadow:2px 2px 0 0 rgba(10,9,0,.5); font-size:12px; padding:4px 10px; }
  #banner button:hover { transform:translate(-1px,-1px); box-shadow:3px 3px 0 0 rgba(10,9,0,.5); }
  /* quiet docs link — a text link in the header chrome, never a CTA */
  .doclink { color:var(--muted); font-size:13px; font-weight:500; text-decoration:none;
    border-bottom:1.5px solid transparent; }
  .doclink:hover { color:var(--fg); border-bottom-color:var(--accent); }
  /* P1: turn/presence chip, threaded suggestion, done control */
  .turn { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .turn:empty { display:none; }
  .turn .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 1px var(--fg); flex:none; }
  .turn.here { color:var(--fg); font-weight:500; }
  .turn .orphan { color:var(--fg); border-bottom:1.5px solid var(--accent); cursor:pointer; }
  @keyframes presPulse { 0%,100%{opacity:.35} 50%{opacity:1} }
  .turn.responding .dot { animation:presPulse 1s ease-in-out infinite; }
  /* quiet, not appetizing — a muted text link (mainly for mobile, where there's no chat to say "done") */
  .donebtn { font-size:12px; display:none; }
  /* a suggestion nested inside the comment thread it answers (replyTo) — a quiet recessed panel,
     NOT a left-accent callout; the accent lives in the diff's <ins> highlights + the claude dot */
  .subcard { margin:9px 0 5px; padding:11px 13px; border:1px solid var(--line-strong);
    border-radius:12px; background:rgba(15,15,12,.025); }
  .subcard .who { font-weight:600; }
  #filelist { padding:48px 40px; max-width:760px; margin:0 auto; }
  #filelist h2 { font-weight:500; letter-spacing:-.02em; }
  #filelist a { display:flex; justify-content:space-between; padding:11px 14px; border-bottom:1px solid var(--line);
    text-decoration:none; color:var(--fg); } #filelist a:hover { background:var(--card); }
  .count { background:var(--accent); color:var(--accent-fg); border-radius:99px; font-size:11.5px; padding:1px 9px; font-weight:600; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:28px 0; }

  /* --- mobile: single-column doc, review panel becomes a pull-up bottom sheet --- */
  #sheetToggle, #sheetBackdrop { display:none; }
  @media (max-width: 780px) {
    main { grid-template-columns: minmax(0,1fr); }   /* minmax(0,…) so a code block can't force overflow */
    #doc pre { max-width:100%; }
    #pwd { padding:16px 18px 0; font-size:12px; }
    #doc { padding: 8px 18px 42vh; font-size: 16px; line-height:1.62; }
    #doc h1 { font-size:1.45em; } #doc h2 { font-size:1.18em; }
    .hwrap { padding:11px 18px; gap:10px; }
    header h1 { font-size:15px; max-width:56vw; }
    header h1 .ghost { width:22px; height:22px; }
    #status { min-width:0; }
    #filelist { padding:28px 18px; }
    #popover { width:min(300px, calc(100vw - 24px)); }
    /* iOS Safari zooms into any focused input with font-size <16px (and won't zoom back). Pin to 16px. */
    .reply, #popover textarea, #seltool input { font-size:16px; }

    /* the sidebar, reframed as a bottom sheet */
    aside {
      position:fixed; left:0; right:0; bottom:0; top:auto; height:76vh;
      border-left:none; border-top:1.5px solid var(--fg); border-radius:20px 20px 0 0;
      background:var(--bg); box-shadow:0 -10px 34px rgba(10,9,0,.20);
      transform:translateY(102%); transition:transform .26s ease-out; z-index:46;
      padding:22px 16px calc(env(safe-area-inset-bottom) + 20px); gap:14px;
    }
    aside::before { content:''; position:absolute; top:9px; left:50%; transform:translateX(-50%);
      width:40px; height:4px; border-radius:99px; background:var(--line-strong); }
    body.sheet-open aside { transform:translateY(0); }

    #sheetBackdrop { display:block; position:fixed; inset:0; background:rgba(10,9,0,.30); z-index:45;
      opacity:0; pointer-events:none; transition:opacity .26s; }
    body.sheet-open #sheetBackdrop { opacity:1; pointer-events:auto; }

    /* the pull-up pill — neo-brutalist, shows the open-item count */
    #sheetToggle { display:inline-flex; align-items:center; gap:7px; position:fixed;
      right:16px; bottom:calc(env(safe-area-inset-bottom) + 16px); z-index:44;
      background:var(--card); color:var(--fg); border:1.5px solid var(--fg); box-shadow:3px 3px 0 0 var(--fg);
      border-radius:99px; padding:10px 16px; font-weight:600; font-size:14px; }
    #sheetToggle .n { background:var(--accent); color:var(--accent-fg); border-radius:99px;
      min-width:20px; text-align:center; padding:0 6px; font-size:12.5px; }
    #sheetToggle .n:empty { display:none; }
    body.sheet-open #sheetToggle { display:none; }
  }
</style>
</head>

</header>

<script>
const qs = new URLSearchParams(location.search);
let FILE = qs.get('f');
let state = null, blocks = [], pendingSel = null;
let dirty = false, saveTimer = null, savedRange = null;

// HTML → markdown serializer. Escaping off so prose keeps clean markers (no `\*` noise);
// this is a personal editor, not a hostile-input renderer.
const td = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-',
  codeBlockStyle: 'fenced', emDelimiter: '_', hr: '---' });
td.escape = (s) => s;
// GFM round-trip: without these rules turndown flattens tables to loose lines, drops task-list
// checkboxes, and strips ~~strikethrough~~ — silently corrupting any such block it re-serializes.
// (tables/strike/tasklist operate on <table>/<del>/<li><input>; no overlap with the custom li rule below.)
td.use(turndownPluginGfm.gfm);
// Tight list markers ("- " / "1. ", 2-space continuation) instead of turndown's 4-space padding,
// so a one-word edit doesn't reflow every bullet in the git diff.
td.addRule('tightList', {
  filter: 'li',
  replacement: (content, node) => {
    content = content.replace(/^\n+/, '').replace(/\n+$/, '\n').replace(/\n/gm, '\n  ');
    const parent = node.parentNode;
    let prefix = '- ';

// ---------- sidebar ----------
function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// A suggestion's inner word-level diff (old → new), monochrome+accent.
function diffHtml(quote, replacement) {
  return '<div class="diffbox">' + Diff.diffWords(quote, replacement).map(p =>
    p.added ? '<ins>' + esc(p.value) + '</ins>' : p.removed ? '<del>' + esc(p.value) + '</del>' : esc(p.value)).join('') + '</div>';
}
// A suggestion that answers a comment (replyTo) renders INSIDE that thread — its own diff + accept/reject,
// carrying its own data-id so the delegated dispatcher targets the suggestion, not the parent comment.
function nestedSugHtml(sug) {
  const orphan = sug.status === 'orphaned' ? ' <span class="badge orphaned">orphaned — text changed</span>' : '';
  return `<div class="subcard" data-id="${esc(sug.id)}"><span class="who claude">claude</span> <span class="badge suggestion">suggestion</span>${orphan}`
    + diffHtml(sug.anchor.quote, sug.replacement)
    + (sug.note ? `<div class="msg"><span class="t">${esc(sug.note)}</span></div>` : '')
    + `<div class="row"><button class="primary" data-action="accept">accept</button>
       <button data-action="reject">reject</button></div></div>`;
}
function renderSide() {
  const side = $('side');
  const items = state.review.items.filter(i => !['resolved','accepted','rejected'].includes(i.status));
  // Reply suggestions render nested under their parent comment, not as their own top-level card.
  const childSug = {};
  for (const it of state.review.items) if (it.kind === 'suggestion' && it.replyTo && ['pending','orphaned'].includes(it.status))
    (childSug[it.replyTo] = childSug[it.replyTo] || []).push(it);
  const top = items.filter(i => !(i.kind === 'suggestion' && i.replyTo));
  const done = state.review.items.length - items.length;
  $('sheetCount').textContent = top.length || '';   // mobile pull-up pill count
  side.innerHTML = top.length ? '' : `<div class="empty">no open items.${done ? ` (${done} settled)` : ''}<br>select text to comment.</div>`;
  for (const it of top) {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.id = it.id;
    let head = `<span class="who ${it.by}">${it.by}</span> <span class="badge ${it.flag ? 'flag' : it.kind}">${it.flag ? 'flag' : it.kind}</span>`;
    if (it.status === 'orphaned') head += ' <span class="badge orphaned">orphaned — text changed</span>';
    // No interpolated inline handlers: the id lives on the card's data-id (set safely above) and every
    // control carries a static data-action, dispatched by the delegated listeners on #side (see below).
    let body = `<div class="quote" title="click to locate" data-action="locate">${esc(it.anchor.quote)}</div>`;
    if (it.kind === 'suggestion') {
      body += diffHtml(it.anchor.quote, it.replacement);
      if (it.note) body += `<div class="msg"><span class="t">${esc(it.note)}</span></div>`;
      body += `<div class="row"><button class="primary" data-action="accept">accept</button>
               <button data-action="reject">reject</button></div>`;
    } else {
      body += (it.thread || []).map(m => `<div class="msg"><span class="who ${m.by}">${m.by}</span> <span class="t">${esc(m.text)}</span></div>`).join('');
      for (const sug of (childSug[it.id] || [])) body += nestedSugHtml(sug);   // my proposed edits, inline in the thread
      body += `<div class="row"><textarea class="reply" rows="1" placeholder="reply…" oninput="autogrow(this)" data-action="reply"></textarea></div>
               <div class="row spread"><button class="ghost" data-action="resolve">resolve</button>
               <button class="primary" data-action="send">send</button></div>`;
    }
    el.innerHTML = head + body;
    side.appendChild(el);
  }
  markAnchors();   // refresh the in-doc highlight cues to match the current items
  renderTurn();    // header chip: presence / open count / orphaned / done control
}
// Header chip — whose turn / who's here, the open + orphaned counts, and the terminal "done" control.
function renderTurn() {
  const el = $('turn'), doneBtn = $('doneBtn'); if (!el) return;
  const its = state.review.items;
  const open = its.filter(i => ['open','pending'].includes(i.status)).length;
  const orphaned = its.filter(i => i.status === 'orphaned').length;
  const pres = state.presence, session = state.review.session;
  el.className = 'turn'; let html = '';
  if (pres && pres.state === 'responding') { el.classList.add('here','responding'); html = '<span class="dot"></span>claude is responding…'; }
  else if (pres && pres.state === 'watching') { el.classList.add('here'); html = '<span class="dot"></span>claude is here'; }
  else if (session && session.done) html = 'done — sent to claude';
  else if (open) html = open + ' open';
  else html = 'all clear';
  if (orphaned) html += (html ? ' · ' : '') + `<span class="orphan" data-action="orphans" title="text moved or changed — re-anchor or resolve">${orphaned} orphaned</span>`;
  el.innerHTML = html;
  const settled = session && session.done;
  doneBtn.style.display = (its.length && !settled) ? 'inline-flex' : 'none';
}
// Header orphan cue → open the sidebar and flash the orphaned cards (the doc-side fix for §6a: orphaned
// items have no in-doc highlight, so they must never go silently missing).
$('turn').addEventListener('click', (e) => {
  if (!e.target.closest('[data-action="orphans"]')) return;
  toggleSheet(true);
  const card = [...$('side').querySelectorAll('.card')].find(c => c.querySelector('.badge.orphaned'));
  if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); pulse([card]); }
});
// Terminal "done, commit it" — the one decision chat can't make redundant (and the phone's only way to
// say it). Sets session.done; the agent's `margin wait` returns with DONE, and I make the single commit.
async function markDone() {
  state.review.session = { state: 'idle', at: new Date().toISOString(), done: true };
  try {
    const r = await api('PUT', '/api/review', { path: FILE, review: state.review });
    state.review = r.review; renderSide();
    showBanner('Sent to Claude — I’ll wrap up and commit.', [{ label: 'ok', fn: () => {} }]);
  } catch (e) { alert('could not send: ' + e.message); }
}
// grow a textarea to fit its content so the whole comment stays visible while typing
function autogrow(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
async function reply(id, input) {
  if (!input.value.trim()) return;
  const it = state.review.items.find(i => i.id === id);
  it.thread.push({ by: 'alex', at: new Date().toISOString(), text: input.value.trim() });
  const r = await api('PUT', '/api/review', { path: FILE, review: state.review });
  state.review = r.review;
  renderSide();
}
async function resolveItem(id) {
  const it = state.review.items.find(i => i.id === id);
  it.status = 'resolved'; it.decidedAt = new Date().toISOString();
  const r = await api('PUT', '/api/review', { path: FILE, review: state.review });
  state.review = r.review;
  renderSide();
}
async function decide(id, verb) {
  try { await api('POST', '/api/' + verb, { path: FILE, id }); await reloadFile(); }
  catch (e) { alert(verb + ' failed: ' + e.message); reloadFile(); }
}
// Delegated card dispatch: one click listener on #side reads data-action off the clicked control and
// the item id off its .card[data-id] — no id ever interpolated into markup. reply/send find the card's
// own .reply textarea via closest('.card'). (autogrow stays on the textarea's static oninput.)
$('side').addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el || !$('side').contains(el)) return;
  // Nearest data-id, so a nested suggestion's accept/reject targets the suggestion (its .subcard[data-id]),
  // while the comment's own reply/resolve/locate resolve to the enclosing .card[data-id].
  const holder = el.closest('[data-id]'); if (!holder) return;
  const id = holder.dataset.id;
  switch (el.dataset.action) {
    case 'locate': locate(id); break;
    case 'accept': decide(id, 'accept'); break;
    case 'reject': decide(id, 'reject'); break;
    case 'resolve': resolveItem(id); break;
    case 'send': reply(id, holder.querySelector('.reply')); break;
  }
});
// Enter-to-send in a reply textarea (Shift+Enter still newlines) — delegated keydown, same id source.
$('side').addEventListener('keydown', (e) => {
  const ta = e.target.closest('[data-action="reply"]');
  if (!ta || e.key !== 'Enter' || e.shiftKey) return;
  e.preventDefault();
  const card = ta.closest('.card'); if (card) reply(card.dataset.id, ta);
});

// ---------- mobile bottom sheet ----------
function toggleSheet(force) {
  const open = force === undefined ? !document.body.classList.contains('sheet-open') : force;
  document.body.classList.toggle('sheet-open', !!open);
}
// Drag-to-dismiss: the sheet follows the finger down and closes past a threshold, else snaps back.
// Only when the card list is scrolled to the top (scrollTop<=0), so dragging doesn't fight scrolling.
(function sheetDrag() {
  const sheet = $('side');
  let startY = 0, dy = 0, dragging = false, fromTop = false;
  sheet.addEventListener('touchstart', (e) => {
    if (!document.body.classList.contains('sheet-open')) return;
    startY = e.touches[0].clientY; dy = 0;
    fromTop = sheet.scrollTop <= 0;
    dragging = true;
    sheet.style.transition = 'none';
  }, { passive: true });
  sheet.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    dy = e.touches[0].clientY - startY;
    if (dy > 0 && fromTop) {                 // dragging the sheet down (not scrolling the list)
      e.preventDefault();
      sheet.style.transform = 'translateY(' + dy + 'px)';
    }
  }, { passive: false });
  const end = () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';             // restore the .26s ease so close/snap-back animates
    sheet.style.transform = '';              // fall back to CSS: translateY(0) or (on close) 102%
    if (dy > 110) toggleSheet(false);        // past threshold → dismiss
  };
  sheet.addEventListener('touchend', end);
  sheet.addEventListener('touchcancel', end);
})();

// ---------- anchor highlights: a persistent cue on every commented/suggested span ----------
// Wrap the (occurrence-th) match of an anchor quote in <mark data-id> — across text nodes, so a
// phrase that spans bold/links stays fully highlighted. Marks are contenteditable:false (a clean tap
// target, no keyboard) and are stripped by toMd() on save, so they never touch the markdown.
function wrapAnchor(quote, occurrence, id) {
  const walker = document.createTreeWalker($('doc'), NodeFilter.SHOW_TEXT);
  const nodes = []; let full = '';
  while (walker.nextNode()) { nodes.push({ node: walker.currentNode, start: full.length }); full += walker.currentNode.textContent; }
  // Same matcher the server + occurrenceFor use, run over the concatenated rendered text; the returned
  // offsets index straight into `full`, so the text-node slicing below is unchanged.
  const hit = Anchor.findNth(full, quote, occurrence || 0);
  if (!hit) return null;
  const { start, end } = hit;
  const slices = [];
  for (const { node, start: ns } of nodes) {
    const ne = ns + node.textContent.length;
    if (ne <= start || ns >= end) continue;
    slices.push({ node, s: Math.max(0, start - ns), e: Math.min(node.textContent.length, end - ns) });
  }
  let first = null;
  for (const sl of slices) {
    const r = document.createRange(); r.setStart(sl.node, sl.s); r.setEnd(sl.node, sl.e);
    const mark = document.createElement('mark'); mark.className = 'anchor'; mark.dataset.id = id; mark.contentEditable = 'false';
    try { r.surroundContents(mark); if (!first) first = mark; } catch {}
  }
  return first;
}
// Re-apply the cues to match current open items. Skipped while the doc is being edited (protects the
// caret); the marks refresh on the next render/save cycle.
function markAnchors() {
  const doc = $('doc');
  if (document.activeElement === doc || doc.contains(document.activeElement)) return;
  doc.querySelectorAll('mark.anchor').forEach(m => { const p = m.parentNode; while (m.firstChild) p.insertBefore(m.firstChild, m); p.removeChild(m); });
  doc.normalize();
  for (const it of state.review.items) {
    if (!['open', 'pending'].includes(it.status)) continue;
    if (it.kind === 'suggestion' && it.replyTo) continue;   // shares its parent comment's span — don't double-wrap
    wrapAnchor(it.anchor.quote, it.anchor.occurrence || 0, it.id);
  }
}
function pulse(nodes) { nodes.forEach(m => m.classList.add('flash')); setTimeout(() => nodes.forEach(m => m.classList.remove('flash')), 1400); }
// Tap a highlight in the doc → open its review (sheet on mobile) and flash the matching card.
$('doc').addEventListener('click', (e) => {
  const m = e.target.closest && e.target.closest('mark.anchor');
  if (m && m.dataset.id) openReview(m.dataset.id);
});
function openReview(id) {
  toggleSheet(true);
  document.querySelectorAll('.flash').forEach(m => m.classList.remove('flash'));
  pulse([...$('doc').querySelectorAll('mark.anchor[data-id="' + id + '"]')]);
  const card = $('side').querySelector('.card[data-id="' + id + '"]');
  if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); pulse([card]); }
}
// Click a card's quote → jump to (and flash) its highlight in the doc.
function locate(id) {
  toggleSheet(false);
  markAnchors();
  document.querySelectorAll('.flash').forEach(m => m.classList.remove('flash'));
  const marks = [...$('doc').querySelectorAll('mark.anchor[data-id="' + id + '"]')];
  if (!marks.length) return;
  marks[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  pulse(marks);
}

boot();
</script>
</body>
</html>
